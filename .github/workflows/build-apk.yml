name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - "greenjourney-android/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    name: Compile Green Journey APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        working-directory: greenjourney-android
        run: gradle wrapper --gradle-version 8.9 --no-daemon

      - name: Build Debug APK
        working-directory: greenjourney-android
        run: |
          set -o pipefail
          set +e
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build_log.txt
          CODE=${PIPESTATUS[0]}
          if [ $CODE -ne 0 ]; then
            echo ""
            echo "==================== FAILURE CONTEXT (exact cause) ===================="
            grep -nE "e: file:///" -m 15 build_log.txt || true
            grep -n -B 2 -A 18 "What went wrong" build_log.txt || true
            echo "====================================================================="
          fi
          exit $CODE

      - name: Rename APK
        run: cp "greenjourney-android/app/build/outputs/apk/debug/app-debug.apk" "greenjourney.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: greenjourney-apk
          path: greenjourney.apk
          retention-days: 90

      - name: Publish to permanent GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Green Journey — Android APK
          body: Latest build of Green Journey (Kotlin + Jetpack Compose).
          files: greenjourney.apk
          replace_assets: true
